services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-n8n-server
    environment:
      PORT: 3000
      NODE_ENV: production
      API_KEY: ${API_KEY:-replace-with-a-long-random-secret}
      BROADCAST_DELAY_MS: 1500
      POSTGRES_URL: ${POSTGRES_URL:-}
    ports:
      - "3000:3000"
    volumes:
      - whatsapp-session:/app/.wwebjs_auth
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  whatsapp-session:
